<!doctype html>
<html lang="zh-CN">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>OpenResty Learning</title>
    <style>
        body {
            margin: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
            color: #1f2937;
            background: #f8fafc;
        }

        main {
            max-width: 760px;
            margin: 56px auto;
            padding: 0 24px;
        }

        h1 {
            margin: 0 0 16px;
            font-size: 32px;
            line-height: 1.2;
        }

        p {
            margin: 0 0 12px;
            line-height: 1.7;
        }

        code {
            padding: 2px 6px;
            border-radius: 4px;
            background: #e5e7eb;
        }
    </style>
</head>
<body>
<main>
    <h1>OpenResty 已就绪</h1>
    <p>访问 <code>/lua/hello</code> 可以看到 Lua 处理请求的 JSON 响应。</p>
    <p>访问 <code>/api/**</code> 会反向代理到宿主机上的后端服务 <code>host.docker.internal:8081</code>。</p>
</main>

</html>
