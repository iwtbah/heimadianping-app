# 站点配置文件。
# 这个文件不是独立入口，而是被主配置 nginx.conf 中的
# include /etc/nginx/conf.d/*.conf; 加载进 http 块。
# 推荐把 server、upstream、location 等站点级配置放在这里。

# 后端服务 upstream。
# 当前后端运行在宿主机 8081 端口，所以容器内通过 host.docker.internal 访问。
upstream heimadianping_backend {
    server host.docker.internal:8081 max_fails=5 fail_timeout=10s weight=1;
}

# 默认业务站点。
# 因为这里写了 server_name localhost，所以访问 http://localhost:8088 时会优先命中这个 server。
server {
    listen 80;
    server_name localhost;

    # 给响应加一个识别头，方便确认请求经过了 OpenResty。
    add_header X-OpenResty-Learning "heimadianping" always;

    # 静态页面入口。
    # docker-compose 将 ./openresty/html 挂载到 /usr/local/openresty/nginx/html。
    location / {
        root /usr/local/openresty/nginx/html;
        index index.html index.htm;
    }

    # Lua 文件示例接口。
    # 这里使用精确匹配：只有 /lua/hello 会进入该 location。
    location = /lua/hello {
        default_type application/json;
        content_by_lua_file /usr/local/openresty/nginx/lua/hello.lua;
    }
    
    location /hello {
        content_by_lua_block {
            ngx.say("hello openresty")
        }
    }
    
    location /user {
        default_type application/json;
         content_by_lua_block {
             ngx.say('{"id":1,"name":"zhaowenzhuo","role":"engineer"}')
        }
     }
        
    location /greet {
            default_type text/plain;
            content_by_lua_block {
                local args = ngx.req.get_uri_args()
                local name = args["name"] or "guest"
                ngx.say("hello, ", name)
            }
        }
        
     location /api/blog {
            rewrite_by_lua_block {
                ngx.log(ngx.ERR, "1. rewrite phase")
            }
            access_by_lua_block {
                ngx.log(ngx.ERR, "2. access phase")
            }
            content_by_lua_block {
                ngx.log(ngx.ERR, "3. content phase")
                ngx.say("blog detail")
            }
            log_by_lua_block {
                ngx.log(ngx.ERR, "4. log phase")
            }
        }
        
    # 代理后端 API。
    # /api/shop/1 会先 rewrite 成 /shop/1，再转发给后端。
    location /api {
        default_type application/json;
        keepalive_timeout 30s;
        keepalive_requests 1000;
        proxy_http_version 1.1;
        rewrite /api(/.*) $1 break;
        proxy_pass_request_headers on;
        proxy_next_upstream error timeout;
        proxy_pass http://heimadianping_backend;
    }
}
