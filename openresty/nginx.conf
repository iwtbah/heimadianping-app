# OpenResty/Nginx 主配置文件。
# 这里放全局配置，例如 worker、日志、Lua 模块搜索路径、公共 http 配置。
# 具体某个站点的 server/location 配置，推荐放到 conf.d/*.conf 中，便于拆分维护。

worker_processes  1;

error_log  logs/error.log  info;

events {
    worker_connections  1024;
}

http {
    include       mime.types;
    default_type  application/json;

    # OpenResty 查找 Lua 文件的路径。
    # /usr/local/openresty/nginx/lua/hello.lua 可以在 location 中通过 content_by_lua_file 引用。
    lua_package_path "/usr/local/openresty/nginx/lua/?.lua;;";

    access_log  logs/access.log;
    sendfile    on;

    keepalive_timeout  65;

    # 加载额外站点配置。
    # docker-compose 将本机 ./openresty/conf.d 挂载到容器 /etc/nginx/conf.d。
    # 所以 conf.d/default.conf 中的 server 会被合并进当前 http 块。
    include /etc/nginx/conf.d/*.conf;
}
