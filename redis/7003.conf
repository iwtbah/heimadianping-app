# Redis Cluster node 7003.
# 学习环境配置：对宿主机暴露端口，关闭 protected-mode，未设置密码。
# 生产环境应开启认证/ACL、限制网络访问，并根据容量规划调整持久化与超时。
port 7003
bind 0.0.0.0
protected-mode no
dir /data

cluster-enabled yes
cluster-config-file nodes.conf
cluster-node-timeout 5000

# 容器间通信使用固定 Docker IP；宿主机客户端重定向优先返回 localhost:端口。
# 需要 Redis 7+。如果改回 Redis 6.2，请删除 hostname 相关配置，并改用宿主机局域网 IP。
cluster-announce-ip 172.30.0.33
cluster-announce-hostname localhost
cluster-preferred-endpoint-type hostname
cluster-announce-port 7003
cluster-announce-bus-port 17003

appendonly yes
