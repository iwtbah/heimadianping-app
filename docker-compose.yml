# heimadianping
services:
  redis-6380:
    image: redis:6.2.6
    command: ["redis-server", "/usr/local/etc/redis/redis.conf"]
    networks:
      redis-sentinel-net:
        ipv4_address: 172.30.0.10
    volumes:
      - ./redis/6380-data:/data
      - ./redis/6380.conf:/usr/local/etc/redis/redis.conf:ro
    ports:
      - "6380:6380"
    restart: unless-stopped
    # 如果你在 Apple Silicon/M1 且遇到兼容问题，可取消下一行注释强制架构
    # platform: linux/amd64

  redis-6381:
    image: redis:6.2.6
    command: ["redis-server", "/usr/local/etc/redis/redis.conf"]
    networks:
      redis-sentinel-net:
        ipv4_address: 172.30.0.11
    volumes:
      - ./redis/6381-data:/data
      - ./redis/6381.conf:/usr/local/etc/redis/redis.conf:ro
    ports:
      - "6381:6381"
    restart: unless-stopped
    # platform: linux/amd64

  redis-6382:
    image: redis:6.2.6
    command: ["redis-server", "/usr/local/etc/redis/redis.conf"]
    networks:
      redis-sentinel-net:
        ipv4_address: 172.30.0.12
    volumes:
      - ./redis/6382-data:/data
      - ./redis/6382.conf:/usr/local/etc/redis/redis.conf:ro
    ports:
      - "6382:6382"
    restart: unless-stopped
    # platform: linux/amd64

  sentinel-26380:
    image: redis:6.2.6
    command: ["sh", "-c", "test -f /data/sentinel.conf || cp /usr/local/etc/redis/sentinel-template.conf /data/sentinel.conf; redis-sentinel /data/sentinel.conf"]
    networks:
      redis-sentinel-net:
        ipv4_address: 172.30.0.20
    volumes:
      - ./redis/sentinel-26380-data:/data
      - ./redis/sentinel-26380.conf:/usr/local/etc/redis/sentinel-template.conf:ro
    ports:
      - "26380:26380"
    depends_on:
      - redis-6380
      - redis-6381
      - redis-6382
    restart: unless-stopped
    # platform: linux/amd64

  sentinel-26381:
    image: redis:6.2.6
    command: ["sh", "-c", "test -f /data/sentinel.conf || cp /usr/local/etc/redis/sentinel-template.conf /data/sentinel.conf; redis-sentinel /data/sentinel.conf"]
    networks:
      redis-sentinel-net:
        ipv4_address: 172.30.0.21
    volumes:
      - ./redis/sentinel-26381-data:/data
      - ./redis/sentinel-26381.conf:/usr/local/etc/redis/sentinel-template.conf:ro
    ports:
      - "26381:26381"
    depends_on:
      - redis-6380
      - redis-6381
      - redis-6382
    restart: unless-stopped
    # platform: linux/amd64

  sentinel-26382:
    image: redis:6.2.6
    command: ["sh", "-c", "test -f /data/sentinel.conf || cp /usr/local/etc/redis/sentinel-template.conf /data/sentinel.conf; redis-sentinel /data/sentinel.conf"]
    networks:
      redis-sentinel-net:
        ipv4_address: 172.30.0.22
    volumes:
      - ./redis/sentinel-26382-data:/data
      - ./redis/sentinel-26382.conf:/usr/local/etc/redis/sentinel-template.conf:ro
    ports:
      - "26382:26382"
    depends_on:
      - redis-6380
      - redis-6381
      - redis-6382
    restart: unless-stopped
    # platform: linux/amd64

  redis-7001:
    image: redis:7.2
    command: ["redis-server", "/usr/local/etc/redis/redis.conf"]
    networks:
      redis-sentinel-net:
        ipv4_address: 172.30.0.31
    volumes:
      - ./redis/7001-data:/data
      - ./redis/7001.conf:/usr/local/etc/redis/redis.conf:ro
    ports:
      - "7001:7001"
      - "17001:17001"
    restart: unless-stopped
    # platform: linux/amd64

  redis-7002:
    image: redis:7.2
    command: ["redis-server", "/usr/local/etc/redis/redis.conf"]
    networks:
      redis-sentinel-net:
        ipv4_address: 172.30.0.32
    volumes:
      - ./redis/7002-data:/data
      - ./redis/7002.conf:/usr/local/etc/redis/redis.conf:ro
    ports:
      - "7002:7002"
      - "17002:17002"
    restart: unless-stopped
    # platform: linux/amd64

  redis-7003:
    image: redis:7.2
    command: ["redis-server", "/usr/local/etc/redis/redis.conf"]
    networks:
      redis-sentinel-net:
        ipv4_address: 172.30.0.33
    volumes:
      - ./redis/7003-data:/data
      - ./redis/7003.conf:/usr/local/etc/redis/redis.conf:ro
    ports:
      - "7003:7003"
      - "17003:17003"
    restart: unless-stopped
    # platform: linux/amd64

  redis-7004:
    image: redis:7.2
    command: ["redis-server", "/usr/local/etc/redis/redis.conf"]
    networks:
      redis-sentinel-net:
        ipv4_address: 172.30.0.34
    volumes:
      - ./redis/7004-data:/data
      - ./redis/7004.conf:/usr/local/etc/redis/redis.conf:ro
    ports:
      - "7004:7004"
      - "17004:17004"
    restart: unless-stopped
    # platform: linux/amd64

  redis-7005:
    image: redis:7.2
    command: ["redis-server", "/usr/local/etc/redis/redis.conf"]
    networks:
      redis-sentinel-net:
        ipv4_address: 172.30.0.35
    volumes:
      - ./redis/7005-data:/data
      - ./redis/7005.conf:/usr/local/etc/redis/redis.conf:ro
    ports:
      - "7005:7005"
      - "17005:17005"
    restart: unless-stopped
    # platform: linux/amd64

  redis-7006:
    image: redis:7.2
    command: ["redis-server", "/usr/local/etc/redis/redis.conf"]
    networks:
      redis-sentinel-net:
        ipv4_address: 172.30.0.36
    volumes:
      - ./redis/7006-data:/data
      - ./redis/7006.conf:/usr/local/etc/redis/redis.conf:ro
    ports:
      - "7006:7006"
      - "17006:17006"
    restart: unless-stopped
    # platform: linux/amd64

  nginx:
    image: nginx:latest
    ports:
      - "8080:8080"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf
      - ./nginx/html:/etc/nginx/html
    restart: unless-stopped

  openresty:
    build:
      context: ./openresty
    image: heimadianping-openresty:local
    ports:
      - "8088:80"
    networks:
      redis-sentinel-net:
        ipv4_address: 172.30.0.50
    volumes:
      - ./openresty/nginx.conf:/usr/local/openresty/nginx/conf/nginx.conf:ro
      - ./openresty/conf.d:/etc/nginx/conf.d:ro
      - ./openresty/html:/usr/local/openresty/nginx/html:ro
      - ./openresty/lua:/usr/local/openresty/nginx/lua:ro
      - ./openresty/logs:/usr/local/openresty/nginx/logs
    restart: unless-stopped
    # platform: linux/amd64

  mysql:
    image: mysql:8.0
    ports:
      - "3306:3306"
    environment:
      MYSQL_ROOT_PASSWORD: 123456
      MYSQL_DATABASE: hmdp 
      MYSQL_USER: appuser        # 创建普通用户 appuser
      MYSQL_PASSWORD: apppass    # 设置普通用户密码
    volumes:
      - ./mysql/mysql-data:/var/lib/mysql
    restart: unless-stopped

networks:
  redis-sentinel-net:
    driver: bridge
    ipam:
      config:
        - subnet: 172.30.0.0/24
